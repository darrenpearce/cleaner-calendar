<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Staff Login</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="logo-mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&family=Quicksand:wght@500;600;700&family=Parisienne&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2B2A33;
    --muted: #8A7E86;
    --pink: #E93C8F;
    --pink-soft: #F7A8C9;
    --blush-2: #FDEEF5;
    --line: #F6D9E7;
    --line-2: #F0C9DD;
    --cream: #FFF9FC;
    --wine: #7E1448;
    --shadow-sm: 0 6px 16px rgba(233,60,143,.14);
    --shadow-md: 0 18px 44px rgba(126,20,72,.14);
    --radius: 18px;
    --danger: #dc2626;
    --success: #16a34a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    background: var(--cream);
    color: var(--ink);
    padding: 24px 16px 64px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  .site-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 18px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
  }
  .site-nav .brand { display: flex; align-items: center; gap: 8px; font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--ink); text-decoration: none; }
  .site-nav .brand img { width: 30px; height: 30px; border-radius: 50%; }
  .site-nav .brand .script { font-family: 'Parisienne', cursive; color: var(--pink); font-size: 1.3em; }
  .site-nav nav { display: flex; gap: 4px; }
  .site-nav nav a {
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--muted);
    text-decoration: none;
    padding: 7px 12px;
    border-radius: 9px;
    transition: background 0.15s, color 0.15s;
  }
  .site-nav nav a:hover, .site-nav nav a.active { background: var(--blush-2); color: var(--pink); }
  h1 {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 1.6rem;
    margin: 0 0 4px;
    color: var(--ink);
  }
  h1 .script { font-family: 'Parisienne', cursive; font-weight: 400; color: var(--pink); font-size: 1.3em; line-height: 1; }
  p.sub { color: var(--muted); margin: 0 0 24px; }
  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 16px;
  }
  label { font-size: 0.9rem; color: var(--muted); display: block; margin-bottom: 6px; }
  h2.section-title {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    margin: 0 0 14px;
    color: var(--ink);
  }
  .list-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .list-row:last-child { border-bottom: none; }
  .availability-form { display: flex; gap: 10px; }
  .availability-form input[type="date"] { flex: 1; margin-bottom: 0; }
  select, input[type="password"], input[type="date"] {
    width: 100%;
    padding: 12px;
    border: 1.5px solid var(--line-2);
    border-radius: 10px;
    font-size: 1rem;
    font-family: inherit;
    margin-bottom: 14px;
    color: var(--ink);
    background: #fff;
  }
  select:focus-visible, input:focus-visible { outline: 3px solid var(--pink); outline-offset: 2px; }
  button.primary {
    font-family: 'Quicksand', sans-serif;
    width: 100%;
    padding: 13px 20px;
    border-radius: 12px;
    border: none;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    background: linear-gradient(135deg, #F26FB0, var(--pink));
    color: #fff;
    box-shadow: var(--shadow-sm);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  button.primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  button.ghost {
    font-family: 'Quicksand', sans-serif;
    background: #fff;
    color: var(--ink);
    border: 1.5px solid var(--line-2);
    border-radius: 12px;
    padding: 9px 16px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
  }
  button.ghost:hover { border-color: var(--pink); color: var(--pink); }
  button.ghost:disabled { opacity: 0.5; cursor: not-allowed; }
  button.ghost:disabled:hover { border-color: var(--line-2); color: var(--ink); }
  button.ghost.danger { color: var(--danger); }
  button.ghost.danger:hover { border-color: var(--danger); color: var(--danger); }
  .job-actions .hint { display: block; margin-top: 6px; font-size: 0.8rem; color: var(--muted); }
  .msg { font-size: 0.9rem; margin-top: 10px; }
  .msg.error { color: var(--danger); }
  .msg.muted { color: var(--muted); }

  .jobs-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .jobs-header h1 { margin: 0; }

  .job-card {
    border: 1.5px solid var(--line-2);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .job-card.completed { opacity: 0.6; }
  .job-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
  .job-date { font-family: 'Quicksand', sans-serif; font-weight: 700; }
  .job-time { color: var(--pink); font-weight: 700; }
  .job-customer { color: var(--muted); font-size: 0.9rem; margin-bottom: 10px; }
  .job-customer a { color: var(--pink); font-weight: 600; text-decoration: none; }
  .job-customer a:hover { text-decoration: underline; }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Quicksand', sans-serif;
    padding: 3px 10px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: .04em;
    background: #dcfce7;
    color: var(--success);
  }
  .task-checklist { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
  .task-checklist label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.95rem;
    color: var(--ink);
    margin: 0;
    cursor: pointer;
  }
  .task-checklist input { width: 18px; height: 18px; accent-color: var(--pink); }
  .task-checklist .done { text-decoration: line-through; color: var(--muted); }
  .job-actions { margin-top: 10px; }
  .empty-state { text-align: center; color: var(--muted); padding: 30px 0; }
  .site-footer { text-align: center; font-size: 0.75rem; color: var(--muted); opacity: 0.7; margin: 24px 0 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="site-nav">
    <a class="brand" href="index.html"><img src="logo-mark.png" alt="">Book<span class="script">clean</span></a>
    <nav>
      <a href="index.html">Book</a>
      <a href="cleaner.html" class="active">Staff Login</a>
      <a href="admin.html">Admin</a>
    </nav>
  </div>

  <div id="login-view">
    <h1>Staff <span class="script">login</span></h1>
    <p class="sub">Pick your name and enter your PIN to see today's jobs.</p>
    <div class="card">
      <label for="cleaner-select">Name</label>
      <select id="cleaner-select"></select>
      <label for="pin-input">PIN</label>
      <input type="password" id="pin-input" inputmode="numeric" pattern="\d{4,6}" maxlength="6">
      <button class="primary" id="login-btn">Log in</button>
      <p class="msg" id="login-msg"></p>
    </div>
  </div>

  <div id="jobs-view" style="display:none">
    <div class="jobs-header">
      <h1>Your <span class="script">jobs</span></h1>
      <button class="ghost" id="logout-btn">Log out</button>
    </div>

    <div class="card">
      <h2 class="section-title">Your availability</h2>
      <div class="availability-form">
        <input type="date" id="unavailable-date-input">
        <button class="ghost" id="mark-unavailable-btn">Mark day off</button>
      </div>
      <p class="msg" id="availability-msg"></p>
      <div id="unavailable-list"></div>
    </div>

    <div id="jobs-list"></div>
  </div>

  <p class="site-footer">dp-dev.net &middot; 07735976246</p>
</div>

<script>
(function () {
  'use strict';

  var API_BASE = 'https://cleaner-calendar-production.up.railway.app';
  var TOKEN_KEY = 'cleaner-calendar-token';
  var NAME_KEY = 'cleaner-calendar-name';

  var SERVICE_LABELS = {
    standard: 'Standard Clean',
    deep: 'Deep Clean',
    move: 'Move In/Out',
    oven: 'Oven Clean'
  };

  var loginView = document.getElementById('login-view');
  var jobsView = document.getElementById('jobs-view');
  var cleanerSelect = document.getElementById('cleaner-select');
  var pinInput = document.getElementById('pin-input');
  var loginBtn = document.getElementById('login-btn');
  var loginMsg = document.getElementById('login-msg');
  var jobsList = document.getElementById('jobs-list');
  var logoutBtn = document.getElementById('logout-btn');
  var unavailableDateInput = document.getElementById('unavailable-date-input');
  var markUnavailableBtn = document.getElementById('mark-unavailable-btn');
  var unavailableList = document.getElementById('unavailable-list');
  var availabilityMsg = document.getElementById('availability-msg');

  unavailableDateInput.min = new Date().toISOString().slice(0, 10);

  function authHeaders() {
    return { Authorization: 'Bearer ' + localStorage.getItem(TOKEN_KEY) };
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str == null ? '' : str;
    return div.innerHTML;
  }

  function showLogin() {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(NAME_KEY);
    loginView.style.display = 'block';
    jobsView.style.display = 'none';
    loadCleanerNames();
  }

  function showJobs() {
    loginView.style.display = 'none';
    jobsView.style.display = 'block';
    loadJobs();
    loadUnavailability();
  }

  function loadCleanerNames() {
    cleanerSelect.innerHTML = '<option>Loading...</option>';
    fetch(API_BASE + '/api/cleaner/names')
      .then(function (res) {
        if (!res.ok) throw new Error('bad-response');
        return res.json();
      })
      .then(function (data) {
        var cleaners = data.cleaners || [];
        if (!cleaners.length) {
          cleanerSelect.innerHTML = '<option value="">No staff set up yet</option>';
          return;
        }
        cleanerSelect.innerHTML = cleaners.map(function (c) {
          return '<option value="' + c.id + '">' + escapeHtml(c.name) + '</option>';
        }).join('');
      })
      .catch(function () {
        cleanerSelect.innerHTML = '<option value="">Could not load names</option>';
      });
  }

  loginBtn.addEventListener('click', function () {
    var cleanerId = parseInt(cleanerSelect.value, 10);
    var pin = pinInput.value.trim();
    if (!cleanerId || !pin) {
      loginMsg.textContent = 'Pick your name and enter your PIN.';
      loginMsg.className = 'msg error';
      return;
    }

    loginMsg.textContent = 'Logging in...';
    loginMsg.className = 'msg muted';

    fetch(API_BASE + '/api/cleaner/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cleanerId: cleanerId, pin: pin })
    })
      .then(function (res) { return res.json().then(function (data) { return { status: res.status, data: data }; }); })
      .then(function (result) {
        if (result.status === 200) {
          localStorage.setItem(TOKEN_KEY, result.data.token);
          localStorage.setItem(NAME_KEY, result.data.name);
          pinInput.value = '';
          loginMsg.textContent = '';
          showJobs();
          return;
        }
        loginMsg.textContent = 'Incorrect PIN. Please try again.';
        loginMsg.className = 'msg error';
      })
      .catch(function () {
        loginMsg.textContent = 'Network error. Please try again.';
        loginMsg.className = 'msg error';
      });
  });

  pinInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') loginBtn.click();
  });

  logoutBtn.addEventListener('click', showLogin);

  function renderJobs(jobs) {
    if (!jobs.length) {
      jobsList.innerHTML = '<p class="empty-state">No jobs assigned to you yet.</p>';
      return;
    }

    jobsList.innerHTML = jobs.map(function (job) {
      var isDone = !!job.completed_at;
      var tasks = job.tasks || [];
      var allTasksTicked = tasks.every(function (t) { return !!t.completedAt; });
      var tasksHtml = tasks.map(function (t) {
        return '<label class="' + (t.completedAt ? 'done' : '') + '">' +
          '<input type="checkbox" data-job="' + job.id + '" data-task="' + t.id + '"' + (t.completedAt ? ' checked' : '') + (isDone ? ' disabled' : '') + '>' +
          escapeHtml(t.name) + '</label>';
      }).join('');

      var actionsHtml = '';
      if (!isDone) {
        actionsHtml = '<div class="job-actions">' +
          '<button class="ghost complete-btn" data-job-id="' + job.id + '"' + (allTasksTicked ? '' : ' disabled') + '>Mark job complete</button>' +
          (allTasksTicked ? '' : '<span class="hint">Tick off all tasks above to complete this job</span>') +
          '</div>';
      }

      return '<div class="job-card' + (isDone ? ' completed' : '') + '" data-job-id="' + job.id + '">' +
        '<div class="job-top">' +
        '<div><span class="job-date">' + job.date + '</span> &middot; <span class="job-time">' + job.time + '</span></div>' +
        (isDone ? '<span class="badge">Completed</span>' : '') +
        '</div>' +
        '<div>' + (SERVICE_LABELS[job.service] || job.service) + '</div>' +
        '<div class="job-customer">' + escapeHtml(job.name) + ' &middot; <a href="tel:' + encodeURIComponent(job.phone) + '">' + escapeHtml(job.phone) + '</a></div>' +
        '<div class="job-customer"><a href="https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(job.address) + '" target="_blank" rel="noopener">' + escapeHtml(job.address) + '</a></div>' +
        (tasksHtml ? '<div class="task-checklist">' + tasksHtml + '</div>' : '') +
        actionsHtml +
        '</div>';
    }).join('');

    jobsList.querySelectorAll('input[type="checkbox"]').forEach(function (cb) {
      cb.addEventListener('change', function () {
        toggleTask(this.dataset.job, this.dataset.task, this.checked, this);
      });
    });

    jobsList.querySelectorAll('.complete-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        completeJob(this.dataset.jobId);
      });
    });
  }

  function toggleTask(jobId, taskId, completed, checkbox) {
    checkbox.disabled = true;
    fetch(API_BASE + '/api/cleaner/jobs/' + jobId + '/tasks/' + taskId, {
      method: 'PATCH',
      headers: Object.assign({ 'Content-Type': 'application/json' }, authHeaders()),
      body: JSON.stringify({ completed: completed })
    })
      .then(function (res) {
        if (res.status === 401) throw new Error('unauthorized');
        if (!res.ok) throw new Error('failed');
        return loadJobs();
      })
      .catch(function (err) {
        if (err.message === 'unauthorized') return showLogin();
        checkbox.checked = !completed;
        checkbox.disabled = false;
      });
  }

  function completeJob(jobId) {
    fetch(API_BASE + '/api/cleaner/jobs/' + jobId + '/complete', {
      method: 'PATCH',
      headers: authHeaders()
    })
      .then(function (res) {
        if (res.status === 401) throw new Error('unauthorized');
        if (!res.ok) throw new Error('failed');
        return loadJobs();
      })
      .catch(function (err) {
        if (err.message === 'unauthorized') showLogin();
      });
  }

  function renderUnavailableDates(dates) {
    if (!dates.length) {
      unavailableList.innerHTML = '<p class="msg muted">You\'re available every day.</p>';
      return;
    }

    unavailableList.innerHTML = dates.map(function (date) {
      return '<div class="list-row"><span>' + escapeHtml(date) + '</span>' +
        '<button class="ghost danger remove-unavailable-btn" data-date="' + escapeHtml(date) + '">Remove</button></div>';
    }).join('');

    unavailableList.querySelectorAll('.remove-unavailable-btn').forEach(function (btn) {
      btn.addEventListener('click', function () { removeUnavailable(this.dataset.date); });
    });
  }

  function loadUnavailability() {
    fetch(API_BASE + '/api/cleaner/unavailability', { headers: authHeaders() })
      .then(function (res) {
        if (res.status === 401) throw new Error('unauthorized');
        if (!res.ok) throw new Error('server-error');
        return res.json();
      })
      .then(function (data) {
        renderUnavailableDates(data.dates || []);
      })
      .catch(function (err) {
        if (err.message === 'unauthorized') {
          showLogin();
        } else {
          unavailableList.innerHTML = '<p class="msg error">Could not load your availability.</p>';
        }
      });
  }

  markUnavailableBtn.addEventListener('click', function () {
    var date = unavailableDateInput.value;
    if (!date) {
      availabilityMsg.textContent = 'Pick a date first.';
      availabilityMsg.className = 'msg error';
      return;
    }

    availabilityMsg.textContent = '';
    fetch(API_BASE + '/api/cleaner/unavailability', {
      method: 'POST',
      headers: Object.assign({ 'Content-Type': 'application/json' }, authHeaders()),
      body: JSON.stringify({ date: date })
    })
      .then(function (res) {
        if (res.status === 401) throw new Error('unauthorized');
        if (!res.ok) throw new Error('failed');
        unavailableDateInput.value = '';
        return loadUnavailability();
      })
      .catch(function (err) {
        if (err.message === 'unauthorized') return showLogin();
        availabilityMsg.textContent = 'Could not mark that day. Please try again.';
        availabilityMsg.className = 'msg error';
      });
  });

  function removeUnavailable(date) {
    fetch(API_BASE + '/api/cleaner/unavailability/' + encodeURIComponent(date), {
      method: 'DELETE',
      headers: authHeaders()
    })
      .then(function (res) {
        if (res.status === 401) throw new Error('unauthorized');
        if (!res.ok) throw new Error('failed');
        return loadUnavailability();
      })
      .catch(function (err) {
        if (err.message === 'unauthorized') showLogin();
      });
  }

  function loadJobs() {
    fetch(API_BASE + '/api/cleaner/jobs', { headers: authHeaders() })
      .then(function (res) {
        if (res.status === 401) throw new Error('unauthorized');
        if (!res.ok) throw new Error('server-error');
        return res.json();
      })
      .then(function (data) {
        renderJobs(data.jobs || []);
      })
      .catch(function (err) {
        if (err.message === 'unauthorized') {
          showLogin();
        } else {
          jobsList.innerHTML = '<p class="empty-state">Could not load your jobs. Please try again.</p>';
        }
      });
  }

  if (localStorage.getItem(TOKEN_KEY)) {
    showJobs();
  } else {
    showLogin();
  }
})();
</script>
</body>
</html>
