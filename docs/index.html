<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book a Cleaning Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&family=Quicksand:wght@500;600;700&family=Parisienne&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2B2A33;
    --muted: #8A7E86;
    --pink: #E93C8F;
    --pink-soft: #F7A8C9;
    --blush: #FCE3EF;
    --blush-2: #FDEEF5;
    --line: #F6D9E7;
    --line-2: #F0C9DD;
    --cream: #FFF9FC;
    --wine: #7E1448;
    --shadow-sm: 0 6px 16px rgba(233,60,143,.14);
    --shadow-md: 0 18px 44px rgba(126,20,72,.14);
    --radius: 18px;
    --danger: #dc2626;
    --success: #16a34a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    background: var(--cream);
    color: var(--ink);
    padding: 24px 16px 64px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  .site-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 18px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
  }
  .site-nav .brand {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--ink);
    text-decoration: none;
  }
  .site-nav .brand .script { font-family: 'Parisienne', cursive; color: var(--pink); font-size: 1.3em; }
  .site-nav nav { display: flex; gap: 4px; }
  .site-nav nav a {
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--muted);
    text-decoration: none;
    padding: 7px 12px;
    border-radius: 9px;
    transition: background 0.15s, color 0.15s;
  }
  .site-nav nav a:hover, .site-nav nav a.active { background: var(--blush-2); color: var(--pink); }
  h1 {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 1.6rem;
    margin: 0 0 4px;
    color: var(--ink);
  }
  h1 .script {
    font-family: 'Parisienne', cursive;
    font-weight: 400;
    color: var(--pink);
    font-size: 1.3em;
    line-height: 1;
  }
  p.sub { color: var(--muted); margin: 0 0 24px; }
  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow-sm);
  }
  .steps {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .steps div {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--line);
  }
  .steps div.active { background: linear-gradient(135deg, #F26FB0, var(--pink)); }
  .steps div.done { background: var(--pink); opacity: 0.5; }
  h2 {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 12.5px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--pink);
    margin: 0 0 16px;
  }
  .service-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .service-btn, .time-btn {
    font-family: 'Quicksand', sans-serif;
    border: 1.5px solid var(--line-2);
    background: #fff;
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--ink);
    transition: border-color 0.15s, background 0.15s, transform 0.15s;
  }
  .service-btn:hover, .time-btn:not(:disabled):hover { border-color: var(--pink); color: var(--pink); }
  .service-btn.selected, .time-btn.selected {
    border-color: var(--pink);
    background: var(--blush-2);
    color: var(--wine);
    font-weight: 700;
  }
  .service-btn small { display: block; color: var(--muted); font-weight: 400; margin-top: 2px; }
  .time-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    text-decoration: line-through;
  }
  .task-list { display: flex; flex-direction: column; gap: 10px; }
  .task-row {
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1.5px solid var(--line-2);
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    transition: border-color 0.15s, background 0.15s;
  }
  .task-row:hover { border-color: var(--pink); }
  .task-row.selected { border-color: var(--pink); background: var(--blush-2); color: var(--wine); }
  .task-row input { width: 18px; height: 18px; accent-color: var(--pink); }
  .task-empty { color: var(--muted); font-size: 0.9rem; }
  input[type="date"], input[type="text"], input[type="email"] {
    width: 100%;
    padding: 12px;
    border: 1.5px solid var(--line-2);
    border-radius: 10px;
    font-size: 1rem;
    font-family: inherit;
    margin-bottom: 14px;
    color: var(--ink);
  }
  input:focus-visible { outline: 3px solid var(--pink); outline-offset: 2px; }
  label { font-size: 0.9rem; color: var(--muted); display: block; margin-bottom: 6px; }
  .time-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .actions {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
    gap: 10px;
  }
  button.primary, button.back {
    font-family: 'Quicksand', sans-serif;
    padding: 13px 20px;
    border-radius: 12px;
    border: none;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  button.primary {
    background: linear-gradient(135deg, #F26FB0, var(--pink));
    color: #fff;
    flex: 1;
    box-shadow: var(--shadow-sm);
  }
  button.primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  button.primary:disabled { background: var(--pink-soft); box-shadow: none; cursor: not-allowed; }
  button.back {
    background: #fff;
    color: var(--ink);
    border: 1.5px solid var(--line-2);
  }
  button.back:hover { border-color: var(--pink); color: var(--pink); }
  .msg { margin-top: 14px; font-size: 0.9rem; }
  .msg.error { color: var(--danger); }
  .msg.success { color: var(--success); }
  .summary {
    background: var(--blush-2);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 0.9rem;
    margin-bottom: 16px;
    line-height: 1.6;
    color: var(--wine);
  }
  .confirmation { text-align: center; padding: 20px 0; }
  .confirmation .icon { font-size: 2.5rem; margin-bottom: 8px; }
  .confirmation h2 { text-transform: none; letter-spacing: normal; font-size: 1.3rem; color: var(--ink); }
</style>
</head>
<body>
<div class="wrap">
  <div class="site-nav">
    <a class="brand" href="index.html">Book<span class="script">clean</span></a>
    <nav>
      <a href="index.html" class="active">Book</a>
      <a href="cleaner.html">Staff Login</a>
      <a href="admin.html">Admin</a>
    </nav>
  </div>

  <h1>Book your <span class="script">clean</span></h1>
  <p class="sub">Pick a service, date, and time that works for you.</p>

  <div class="card">
    <div class="steps">
      <div id="step-dot-1" class="active"></div>
      <div id="step-dot-2"></div>
      <div id="step-dot-3"></div>
      <div id="step-dot-4"></div>
      <div id="step-dot-5"></div>
    </div>

    <!-- Step 1: Service -->
    <section id="step-1">
      <h2>1. Choose a service</h2>
      <div class="service-grid" id="service-grid"></div>
      <div class="actions">
        <span></span>
        <button class="primary" id="to-step-2" disabled>Next</button>
      </div>
    </section>

    <!-- Step 2: Extra tasks -->
    <section id="step-2" style="display:none">
      <h2>2. Extra tasks (optional)</h2>
      <div class="task-list" id="task-list"></div>
      <div class="actions">
        <button class="back" id="back-to-1">Back</button>
        <button class="primary" id="to-step-3">Next</button>
      </div>
    </section>

    <!-- Step 3: Date -->
    <section id="step-3" style="display:none">
      <h2>3. Choose a date</h2>
      <label for="date-input">Date</label>
      <input type="date" id="date-input">
      <div class="actions">
        <button class="back" id="back-to-2">Back</button>
        <button class="primary" id="to-step-4" disabled>Next</button>
      </div>
    </section>

    <!-- Step 4: Time -->
    <section id="step-4" style="display:none">
      <h2>4. Choose a time</h2>
      <div class="time-grid" id="time-grid"></div>
      <p class="msg" id="availability-msg"></p>
      <div class="actions">
        <button class="back" id="back-to-3">Back</button>
        <button class="primary" id="to-step-5" disabled>Next</button>
      </div>
    </section>

    <!-- Step 5: Details -->
    <section id="step-5" style="display:none">
      <h2>5. Your details</h2>
      <div class="summary" id="booking-summary"></div>
      <label for="name-input">Name</label>
      <input type="text" id="name-input" autocomplete="name">
      <label for="email-input">Email</label>
      <input type="email" id="email-input" autocomplete="email">
      <p class="msg" id="submit-msg"></p>
      <div class="actions">
        <button class="back" id="back-to-4">Back</button>
        <button class="primary" id="submit-booking">Confirm booking</button>
      </div>
    </section>

    <!-- Step 6: Confirmation -->
    <section id="step-6" style="display:none">
      <div class="confirmation">
        <div class="icon">&#9989;</div>
        <h2>Booking confirmed</h2>
        <p id="confirmation-text" class="sub"></p>
      </div>
    </section>
  </div>
</div>

<script>
(function () {
  'use strict';

  var API_BASE = 'https://cleaner-calendar-production.up.railway.app';

  var SERVICES = [
    { id: 'standard', label: 'Standard Clean', hint: 'Regular upkeep' },
    { id: 'deep', label: 'Deep Clean', hint: 'Top to bottom' },
    { id: 'move', label: 'Move In/Out', hint: 'Empty property' },
    { id: 'oven', label: 'Oven Clean', hint: 'Oven only' }
  ];

  var TIME_SLOTS = ['08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00'];

  var TOTAL_STEPS = 6;
  var TOTAL_DOTS = 5;

  var state = {
    service: null,
    taskIds: [],
    date: null,
    time: null
  };

  var serviceGrid = document.getElementById('service-grid');
  var taskList = document.getElementById('task-list');
  var dateInput = document.getElementById('date-input');
  var timeGrid = document.getElementById('time-grid');
  var availabilityMsg = document.getElementById('availability-msg');
  var bookingSummary = document.getElementById('booking-summary');
  var nameInput = document.getElementById('name-input');
  var emailInput = document.getElementById('email-input');
  var submitMsg = document.getElementById('submit-msg');
  var confirmationText = document.getElementById('confirmation-text');

  var toStep2 = document.getElementById('to-step-2');
  var toStep3 = document.getElementById('to-step-3');
  var toStep4 = document.getElementById('to-step-4');
  var toStep5 = document.getElementById('to-step-5');
  var submitBtn = document.getElementById('submit-booking');

  var todayStr = new Date().toISOString().slice(0, 10);
  dateInput.min = todayStr;

  function showStep(n) {
    for (var i = 1; i <= TOTAL_STEPS; i++) {
      document.getElementById('step-' + i).style.display = (i === n) ? 'block' : 'none';
    }
    for (var d = 1; d <= TOTAL_DOTS; d++) {
      var dot = document.getElementById('step-dot-' + d);
      dot.className = d < n ? 'done' : (d === n ? 'active' : '');
    }
  }

  function renderServices() {
    SERVICES.forEach(function (svc) {
      var btn = document.createElement('div');
      btn.className = 'service-btn';
      btn.innerHTML = svc.label + '<small>' + svc.hint + '</small>';
      btn.addEventListener('click', function () {
        state.service = svc;
        Array.prototype.forEach.call(serviceGrid.children, function (c) { c.classList.remove('selected'); });
        btn.classList.add('selected');
        toStep2.disabled = false;
      });
      serviceGrid.appendChild(btn);
    });
  }

  function fetchTasks() {
    taskList.innerHTML = '<p class="task-empty">Loading extra tasks...</p>';
    return fetch(API_BASE + '/api/tasks')
      .then(function (res) {
        if (!res.ok) throw new Error('bad-response');
        return res.json();
      })
      .then(function (data) {
        renderTasks(data.tasks || []);
      })
      .catch(function () {
        taskList.innerHTML = '<p class="task-empty">No extra tasks available right now.</p>';
      });
  }

  function renderTasks(tasks) {
    taskList.innerHTML = '';
    if (!tasks.length) {
      taskList.innerHTML = '<p class="task-empty">No extra tasks available right now.</p>';
      return;
    }

    tasks.forEach(function (task) {
      var row = document.createElement('label');
      row.className = 'task-row';

      var checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.value = task.id;

      checkbox.addEventListener('change', function () {
        if (checkbox.checked) {
          state.taskIds.push(task.id);
          row.classList.add('selected');
        } else {
          state.taskIds = state.taskIds.filter(function (id) { return id !== task.id; });
          row.classList.remove('selected');
        }
      });

      row.appendChild(checkbox);
      row.appendChild(document.createTextNode(task.name));
      taskList.appendChild(row);
    });
  }

  function fetchAvailability(date) {
    timeGrid.innerHTML = '';
    availabilityMsg.textContent = 'Loading availability...';
    availabilityMsg.className = 'msg';
    toStep5.disabled = true;

    return fetch(API_BASE + '/api/availability?date=' + encodeURIComponent(date))
      .then(function (res) {
        if (!res.ok) throw new Error('bad-response');
        return res.json();
      })
      .then(function (data) {
        var booked = data.bookedSlots || [];
        availabilityMsg.textContent = '';
        renderTimeSlots(booked);
      })
      .catch(function () {
        availabilityMsg.textContent = 'Could not load availability. Please try again.';
        availabilityMsg.className = 'msg error';
      });
  }

  function renderTimeSlots(bookedSlots) {
    timeGrid.innerHTML = '';
    state.time = null;
    toStep5.disabled = true;

    TIME_SLOTS.forEach(function (slot) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'time-btn';
      btn.textContent = slot;
      var isBooked = bookedSlots.indexOf(slot) !== -1;
      if (isBooked) {
        btn.disabled = true;
      } else {
        btn.addEventListener('click', function () {
          state.time = slot;
          Array.prototype.forEach.call(timeGrid.children, function (c) { c.classList.remove('selected'); });
          btn.classList.add('selected');
          toStep5.disabled = false;
        });
      }
      timeGrid.appendChild(btn);
    });
  }

  function renderSummary() {
    bookingSummary.innerHTML =
      '<strong>' + state.service.label + '</strong><br>' +
      state.date + ' at ' + state.time;
  }

  toStep2.addEventListener('click', function () {
    showStep(2);
    fetchTasks();
  });
  document.getElementById('back-to-1').addEventListener('click', function () { showStep(1); });

  toStep3.addEventListener('click', function () { showStep(3); });
  document.getElementById('back-to-2').addEventListener('click', function () { showStep(2); });

  dateInput.addEventListener('change', function () {
    toStep4.disabled = !dateInput.value;
  });

  toStep4.addEventListener('click', function () {
    state.date = dateInput.value;
    showStep(4);
    fetchAvailability(state.date);
  });
  document.getElementById('back-to-3').addEventListener('click', function () { showStep(3); });

  toStep5.addEventListener('click', function () {
    renderSummary();
    submitMsg.textContent = '';
    showStep(5);
  });
  document.getElementById('back-to-4').addEventListener('click', function () { showStep(4); });

  submitBtn.addEventListener('click', function () {
    var name = nameInput.value.trim();
    var email = emailInput.value.trim();

    if (!name || !email) {
      submitMsg.textContent = 'Please enter your name and email.';
      submitMsg.className = 'msg error';
      return;
    }

    submitBtn.disabled = true;
    submitMsg.textContent = 'Booking...';
    submitMsg.className = 'msg';

    fetch(API_BASE + '/api/bookings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: name,
        email: email,
        service: state.service.id,
        date: state.date,
        time: state.time,
        taskIds: state.taskIds
      })
    })
      .then(function (res) {
        return res.json().then(function (data) { return { status: res.status, data: data }; });
      })
      .then(function (result) {
        submitBtn.disabled = false;
        if (result.status === 201) {
          confirmationText.textContent =
            state.service.label + ' on ' + state.date + ' at ' + state.time + '. A confirmation has been noted for ' + email + '.';
          showStep(6);
          return;
        }
        if (result.status === 409) {
          submitMsg.textContent = 'Sorry, that slot was just taken. Please pick another time.';
          submitMsg.className = 'msg error';
          showStep(4);
          fetchAvailability(state.date);
          return;
        }
        submitMsg.textContent = 'Something went wrong. Please try again.';
        submitMsg.className = 'msg error';
      })
      .catch(function () {
        submitBtn.disabled = false;
        submitMsg.textContent = 'Network error. Please check your connection and try again.';
        submitMsg.className = 'msg error';
      });
  });

  renderServices();
  showStep(1);
})();
</script>
</body>
</html>
