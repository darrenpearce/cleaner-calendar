<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bookings Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2B2A33;
    --muted: #8A7E86;
    --pink: #E93C8F;
    --blush-2: #FDEEF5;
    --line: #F6D9E7;
    --line-2: #F0C9DD;
    --cream: #FFF9FC;
    --wine: #7E1448;
    --shadow-sm: 0 6px 16px rgba(233,60,143,.14);
    --radius: 18px;
    --danger: #dc2626;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    background: var(--cream);
    color: var(--ink);
    padding: 24px 16px 64px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 900px; margin: 0 auto; }
  h1 {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 1.5rem;
    margin: 0 0 16px;
    color: var(--ink);
  }
  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow-sm);
  }
  .key-row { display: flex; gap: 10px; margin-bottom: 16px; }
  input[type="password"], input[type="text"] {
    flex: 1;
    padding: 10px 12px;
    border: 1.5px solid var(--line-2);
    border-radius: 10px;
    font-size: 0.95rem;
    font-family: inherit;
    color: var(--ink);
  }
  input:focus-visible { outline: 3px solid var(--pink); outline-offset: 2px; }
  button {
    font-family: 'Quicksand', sans-serif;
    padding: 10px 20px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #F26FB0, var(--pink));
    color: #fff;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 700;
    box-shadow: var(--shadow-sm);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  button:hover { transform: translateY(-2px); }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--line); }
  th { font-family: 'Quicksand', sans-serif; color: var(--pink); font-weight: 700; text-transform: uppercase; font-size: 11.5px; letter-spacing: .08em; }
  tbody tr:hover { background: var(--blush-2); }
  .msg { font-size: 0.9rem; margin-bottom: 12px; }
  .msg.error { color: var(--danger); }
  .msg.muted { color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Bookings</h1>
  <div class="card">
    <div class="key-row">
      <input type="password" id="key-input" placeholder="Admin key">
      <button id="load-btn">Load bookings</button>
    </div>
    <p class="msg" id="status-msg"></p>
    <div id="table-wrap"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var API_BASE = 'https://cleaner-calendar-production.up.railway.app';
  var STORAGE_KEY = 'cleaner-calendar-admin-key';

  var keyInput = document.getElementById('key-input');
  var loadBtn = document.getElementById('load-btn');
  var statusMsg = document.getElementById('status-msg');
  var tableWrap = document.getElementById('table-wrap');

  var savedKey = localStorage.getItem(STORAGE_KEY);
  if (savedKey) keyInput.value = savedKey;

  function renderTable(bookings) {
    if (!bookings.length) {
      tableWrap.innerHTML = '';
      statusMsg.textContent = 'No bookings yet.';
      statusMsg.className = 'msg muted';
      return;
    }

    var rows = bookings.map(function (b) {
      return '<tr>' +
        '<td>' + b.date + '</td>' +
        '<td>' + b.time + '</td>' +
        '<td>' + b.service + '</td>' +
        '<td>' + escapeHtml(b.name) + '</td>' +
        '<td>' + escapeHtml(b.email) + '</td>' +
        '<td>' + b.created_at + '</td>' +
        '</tr>';
    }).join('');

    tableWrap.innerHTML =
      '<table><thead><tr>' +
      '<th>Date</th><th>Time</th><th>Service</th><th>Name</th><th>Email</th><th>Booked at</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>';
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function loadBookings() {
    var key = keyInput.value.trim();
    if (!key) {
      statusMsg.textContent = 'Enter the admin key.';
      statusMsg.className = 'msg error';
      return;
    }

    localStorage.setItem(STORAGE_KEY, key);
    statusMsg.textContent = 'Loading...';
    statusMsg.className = 'msg muted';
    tableWrap.innerHTML = '';

    fetch(API_BASE + '/api/bookings', {
      headers: { 'X-Admin-Key': key }
    })
      .then(function (res) {
        if (res.status === 401) throw new Error('unauthorized');
        if (!res.ok) throw new Error('server-error');
        return res.json();
      })
      .then(function (data) {
        statusMsg.textContent = '';
        renderTable(data.bookings || []);
      })
      .catch(function (err) {
        if (err.message === 'unauthorized') {
          statusMsg.textContent = 'Incorrect admin key.';
        } else {
          statusMsg.textContent = 'Could not load bookings. Please try again.';
        }
        statusMsg.className = 'msg error';
      });
  }

  loadBtn.addEventListener('click', loadBookings);
  keyInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') loadBookings();
  });

  if (savedKey) loadBookings();
})();
</script>
</body>
</html>
